version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    ignore:
      # @astrojs/check (via @astrojs/language-server -> @volar/kit) peer-depends on
      # typescript ^5 || ^6. Re-enable major bumps once that supports TS7.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
